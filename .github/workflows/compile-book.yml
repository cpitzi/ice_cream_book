name: Auto-compile book

on:
  pull_request:
    paths:
      - 'front_matter/**'
      - 'recipes/**'
      - 'back_matter/**'
      - 'compile_book.py'

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile book
        run: python compile_book.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet Ice_Cream_to_Fight_Over_COMPLETE.md && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit compiled book
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ice_Cream_to_Fight_Over_COMPLETE.md
          git commit -m "Auto-compile book from source changes"
          git push
